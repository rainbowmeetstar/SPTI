<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #9a9a9a;
    --border: rgba(0,0,0,0.1);

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141414;
      --bg2: #1f1f1f;
      --text: #f0f0f0;
      --text2: #9a9a9a;
      --text3: #666666;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",

  .wrap { max-width: 720px; margin: 0 auto; padding: 0 1.25rem 4rem; }

  .brand { font-size: 12px; letter-spacing: 0.22em; font-weight: 600; color: var(--text); }
  .ptxt { font-size: 11px; color: var(--text2); letter-spacing: 0.05em; }
  .divider { height: 0.5px; background: var(--border); margin-bottom: 2.5rem; }

  .scr { display: none; }
  .scr.on { display: block; }

  /* Intro */
  .hero {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 2rem; margin-bottom: 3rem; align-items: center;
  }
  @media (max-width: 540px) {
    .hero { grid-template-columns: 1fr; }
    .hero-art { max-height: 200px; overflow: hidden; }
  }
  .hero-art {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  .hero-h {
    font-size: 26px; font-weight: 600; color: var(--text);
    line-height: 1.25; margin-bottom: 0.9rem;
  }
  .hero-p { font-size: 13px; color: var(--text2); line-height: 1.75; margin-bottom: 1.75rem; }
  .axis-list { margin-bottom: 1.75rem; }
  .axis-item {
    display: flex; align-items: baseline; gap: 9px;

  .axis-num { font-size: 10px; font-weight: 600; color: var(--text3); min-width: 14px; }
  .go-btn {
    padding: 12px 26px; background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius-md); font-size: 14px;
    cursor: pointer; font-family: inherit; font-weight: 500;
    transition: opacity 0.15s;
  }
  .go-btn:hover { opacity: 0.8; }

  /* Quiz */
  .prog-bar { height: 1px; background: var(--border); margin-bottom: 2.5rem; }
  .prog-fill { height: 100%; background: var(--text); transition: width 0.45s; }
  .q-art {
    border: 0.5px solid var(--border);

  .q-num { font-size: 11px; letter-spacing: 0.1em; color: var(--text2); margin-bottom: 1rem; font-weight: 500; }

  .q-hint { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 2rem; }
  .opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2.5rem; }
  .opt {

    border-radius: var(--radius-md); background: var(--bg);

  .opt:hover { border-color: var(--border2); background: var(--bg2); }
  .opt.sel { border-color: var(--text); background: var(--bg2); }
  .opt-key {
    font-size: 11px; font-weight: 600; color: var(--text2);

  .nbtn.fwd { background: var(--text); border-color: var(--text); color: var(--bg); }

  .r-hero {
    display: grid; grid-template-columns: 220px 1fr;

  }
  @media (max-width: 540px) {

  .r-art { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .r-sport { font-size: 10px; letter-spacing: 0.2em; color: var(--text2); margin-bottom: 0.5rem; font-weight: 600; }
  .r-name { font-size: 34px; font-weight: 700; color: var(--text); line-height: 1.05; margin-bottom: 0.4rem; }
  .r-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
  .axes { display: flex; flex-direction: column; gap: 9px; }
  .ax-row { display: grid; grid-template-columns: 58px 1fr 58px; gap: 6px; align-items: center; }
  .ax-l { font-size: 11px; color: var(--text2); text-align: right; }
  .ax-r { font-size: 11px; color: var(--text2); }
  .ax-tr { height: 3px; background: var(--border); border-radius: 2px; }
  .ax-fi { height: 100%; border-radius: 2px; transition: width 0.8s; }
  .desc-block {
    border-top: 0.5px solid var(--border);
    padding-top: 1.75rem; margin-bottom: 1.75rem;
  }
  .desc-p { font-size: 14px; line-height: 1.85; color: var(--text); margin-bottom: 1rem; }
  .desc-p:last-child { margin-bottom: 0; }
  .dual { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  @media (max-width: 400px) { .dual { grid-template-columns: 1fr; } }
  .dc { padding: 1rem 1.1rem; border: 0.5px solid var(--border); border-radius: var(--radius-md); }
  .dc-l { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text2); margin-bottom: 6px; }
  .dc-t { font-size: 13px; color: var(--text); line-height: 1.6; }
  .traits { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 2rem; }
  .trait {
    font-size: 12px; padding: 4px 11px; border-radius: 99px;
    border: 0.5px solid var(--border); color: var(--text2);
  }
  .share-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .share-btn {
    flex: 1; padding: 12px; border: 0.5px solid var(--border2);
    border-radius: var(--radius-md); background: transparent;
    color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit;
    transition: opacity 0.15s;
  }
  .share-btn:hover { opacity: 0.7; }
  .retry-btn {
    width: 100%; padding: 13px; border: 0.5px solid var(--border);
    border-radius: var(--radius-md); background: transparent;
    color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit;
    letter-spacing: 0.05em; transition: opacity 0.15s;
  }
  .retry-btn:hover { opacity: 0.6; }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 10px 20px;
    border-radius: 99px; font-size: 13px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>

<script>
// ��� SVG helpers ������������������������������������������������
function svg(w, h, body) {
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
}

function introArt() {
  const spots = [
    [60,60,18,'#AFA9EC'],[180,40,12,'#5DCAA5'],[300,70,22,'#EF9F27'],
    [380,45,15,'#ED93B1'],[100,160,10,'#85B7EB'],[220,150,20,'#F0997B'],
    [340,170,14,'#97C459'],[50,260,16,'#CECBF6'],[170,240,11,'#9FE1CB'],
    [290,250,19,'#FAC775'],[390,240,13,'#F4C0D1'],
  ];
  let s = `<rect width="400" height="320" fill="#F1EFE8"/>`;
  s += `<line x1="0" y1="160" x2="400" y2="160" stroke="#D3D1C7" stroke-width="0.5"/>`;
  s += `<line x1="200" y1="0" x2="200" y2="320" stroke="#D3D1C7" stroke-width="0.5"/>`;
  spots.forEach(([x,y,r,c]) => {
    s += `<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" opacity="0.7"/>`;
    s += `<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="${c}" stroke-width="0.5" opacity="0.4"/>`;
  });
  s += `<line x1="60" y1="60" x2="100" y2="160" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  s += `<line x1="180" y1="40" x2="170" y2="240" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  s += `<line x1="300" y1="70" x2="290" y2="250" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  s += `<text x="200" y="175" text-anchor="middle" font-size="9" fill="#888780" letter-spacing="3" font-family="sans-serif">S P T I</text>`;
  return svg(400, 320, s);
}

function qArt(ax, i) {
  const cfg = {
    CN: { bg: '#EEEDFE', c: '#7F77DD', label: '餈�孵�' },
    PS: { bg: '#E1F5EE', c: '#1D9E75', label: '��蝏�' },
    RP: { bg: '#FAEEDA', c: '#BA7517', label: '��璅∪�' },
  };
  const { bg, c, label } = cfg[ax] || cfg.CN;
  let s = `<rect width="680" height="72" fill="${bg}"/>`;
  for (let k = 0; k < 9; k++) {
    const x = 40 + k * 70 + (i % 3) * 12;
    const y = 12 + (k % 3) * 16;
    const r = 4 + (k % 4) * 3;
    s += `<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" opacity="${0.15 + k * 0.07}"/>`;
  }
  for (let k = 0; k < 6; k++) {
    const x1 = 60 + k * 100;
    const x2 = x1 + 40 + (i % 4) * 10;
    s += `<line x1="${x1}" y1="${36 + (k % 2) * 10}" x2="${x2}" y2="${56 - (k % 3) * 8}" stroke="${c}" stroke-width="0.5" opacity="0.4"/>`;
  }
  s += `<text x="24" y="47" font-size="10" fill="${c}" opacity="0.9" font-family="sans-serif" letter-spacing="1">${label}</text>`;
  return svg(680, 72, s);
}

function typeArt(code) {
  const palettes = {
    badminton: { bg:'#EEEDFE', c1:'#AFA9EC', c2:'#7F77DD', c3:'#3C3489' },
    volleyball: { bg:'#FAEEDA', c1:'#FAC775', c2:'#EF9F27', c3:'#633806' },
    pingpong:   { bg:'#E1F5EE', c1:'#9FE1CB', c2:'#1D9E75', c3:'#04342C' },
    swimming:   { bg:'#E6F1FB', c1:'#85B7EB', c2:'#378ADD', c3:'#042C53' },
    climbing:   { bg:'#FAECE7', c1:'#F5C4B3', c2:'#D85A30', c3:'#4A1B0C' },
    golf:       { bg:'#EAF3DE', c1:'#C0DD97', c2:'#639922', c3:'#173404' },
    basketball: { bg:'#FBEAF0', c1:'#F4C0D1', c2:'#D4537E', c3:'#4B1528' },
    pickleball: { bg:'#F1EFE8', c1:'#D3D1C7', c2:'#888780', c3:'#2C2C2A' },
  };
  const p = palettes[code] || palettes.pickleball;

  const draws = {
    badminton: () => {
      let s = '';
      for (let i = 0; i < 16; i++) {
        const a = i * (Math.PI / 8), r = 150;
        const x = (200 + r * Math.cos(a)).toFixed(1), y = (200 + r * Math.sin(a)).toFixed(1);
        s += `<line x1="200" y1="200" x2="${x}" y2="${y}" stroke="${p.c1}" stroke-width="0.5" opacity="0.4"/>`;
        s += `<circle cx="${x}" cy="${y}" r="6" fill="${p.c1}" opacity="0.6"/>`;
      }
      s += `<circle cx="200" cy="200" r="50" fill="${p.c2}" opacity="0.5"/>`;
      s += `<circle cx="200" cy="200" r="25" fill="${p.c3}" opacity="0.8"/>`;
      s += `<circle cx="200" cy="200" r="8" fill="${p.c3}"/>`;
      s += `<ellipse cx="200" cy="200" rx="155" ry="155" fill="none" stroke="${p.c1}" stroke-width="0.5" stroke-dasharray="4,4"/>`;
      return s;
    },
    volleyball: () => {
      let s = `<line x1="40" y1="200" x2="360" y2="200" stroke="${p.c1}" stroke-width="1" opacity="0.5"/>`;
      for (let i = 0; i < 5; i++) {
        const x = 40 + i * 80;
        s += `<circle cx="${x + 40}" cy="${180 + (i % 2) * 40}" r="22" fill="${p.c2}" opacity="0.5"/>`;
        s += `<circle cx="${x + 40}" cy="${180 + (i % 2) * 40}" r="22" fill="none" stroke="${p.c3}" stroke-width="0.5"/>`;
      }
      s += `<circle cx="200" cy="120" r="35" fill="${p.c3}" opacity="0.7"/>`;
      s += `<line x1="40" y1="60" x2="360" y2="60" stroke="${p.c3}" stroke-width="1.5" opacity="0.6"/>`;
      const pts = [];
      for (let i = 0; i < 5; i++) pts.push(`${60 + i * 70},${260 + (i % 2 ? -30 : 30)}`);
      s += `<polyline points="${pts.join(' ')}" fill="none" stroke="${p.c1}" stroke-width="1" opacity="0.5"/>`;
      return s;
    },
    pingpong: () => {
      let s = `<line x1="30" y1="200" x2="370" y2="200" stroke="${p.c1}" stroke-width="0.5" opacity="0.3"/>`;
      s += `<line x1="200" y1="30" x2="200" y2="370" stroke="${p.c1}" stroke-width="0.5" opacity="0.3"/>`;
      s += `<polygon points="200,60 310,200 200,340 90,200" fill="${p.c1}" opacity="0.15" stroke="${p.c2}" stroke-width="0.5"/>`;
      for (let i = 0; i < 8; i++) {
        const a = i * (Math.PI / 4) + (Math.PI / 8), r = 80;
        const x = (200 + r * Math.cos(a)).toFixed(1), y = (200 + r * Math.sin(a)).toFixed(1);
        s += `<circle cx="${x}" cy="${y}" r="10" fill="${p.c2}" opacity="0.6"/>`;
      }
      s += `<circle cx="200" cy="200" r="30" fill="${p.c3}" opacity="0.8"/>`;
      s += `<rect x="155" y="185" width="90" height="30" rx="4" fill="none" stroke="${p.c3}" stroke-width="0.5" transform="rotate(-20 200 200)"/>`;
      return s;
    },
    swimming: () => {
      let s = '';
      for (let i = 0; i < 7; i++) {
        const y = 50 + i * 52;
        s += `<path d="M30,${y} Q100,${y - 20} 200,${y} Q300,${y + 20} 370,${y}" fill="none" stroke="${i % 2 === 0 ? p.c2 : p.c1}" stroke-width="${i % 3 === 0 ? 1.5 : 0.5}" opacity="${0.3 + i * 0.08}"/>`;
      }
      s += `<ellipse cx="200" cy="200" rx="60" ry="25" fill="${p.c3}" opacity="0.6"/>`;
      s += `<ellipse cx="200" cy="200" rx="30" ry="12" fill="${p.c3}" opacity="0.9"/>`;
      return s;
    },
    climbing: () => {
      const holds = [[200,350],[160,300],[230,260],[180,210],[250,165],[200,120],[210,75]];
      let s = '';
      holds.forEach(([x, y], i) => {
        if (i > 0) {
          const [px, py] = holds[i - 1];
          s += `<line x1="${px}" y1="${py}" x2="${x}" y2="${y}" stroke="${p.c1}" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>`;
        }
        s += `<circle cx="${x}" cy="${y}" r="${i === holds.length - 1 ? 14 : 10}" fill="${i === holds.length - 1 ? p.c3 : p.c2}" opacity="${0.5 + i * 0.07}"/>`;
      });
      [[120,180],[290,220],[140,130],[270,100],[80,260],[320,290]].forEach(([x, y]) => {
        s += `<circle cx="${x}" cy="${y}" r="7" fill="${p.c1}" opacity="0.3"/>`;
      });
      return s;
    },
    golf: () => {
      let s = '';
      for (let i = 0; i < 12; i++) {
        const r = 30 + i * 12;
        s += `<ellipse cx="200" cy="320" rx="${r}" ry="${r * 0.3}" fill="none" stroke="${p.c1}" stroke-width="0.5" opacity="${0.15 + i * 0.04}"/>`;
      }
      s += `<path d="M200,320 Q180,220 200,120 Q210,80 200,50" fill="none" stroke="${p.c2}" stroke-width="1"/>`;
      s += `<circle cx="200" cy="50" r="12" fill="${p.c3}" opacity="0.8"/>`;
      s += `<circle cx="200" cy="320" r="6" fill="${p.c3}"/>`;
      for (let i = 0; i < 6; i++) {
        const a = i * (Math.PI / 3);

function classify(sc) {
  const [cn, ps, rp] = sc;
  // CN: range ~-12 to 13, midpoint ~0.5
  // PS: range ~-7 to 15, midpoint ~4
  // RP: range ~-15 to 14, midpoint ~-0.5
  const open   = cn > 0;
  const stable = ps > 3;
  const focus  = rp < 0;

  if ( open &&  stable &&  focus) return 'badminton';
  if ( open &&  stable && !focus) return 'volleyball';
  if ( open && !stable && !focus) return 'pingpong';
  if (!open &&  stable &&  focus) return 'swimming';
  if (!open && !stable &&  focus) return 'climbing';
  if (!open &&  stable && !focus) return 'golf';
  if ( open && !stable &&  focus) return 'basketball';
  return 'pickleball';  // !open && !stable && !focus
}

function calcPcts(sc) {
  // CN: -12~13 �?normalize with actual range
  // PS: -7~15 �?normalize
  // RP: -15~14 �?normalize
  const ranges = [[-12, 13], [-7, 15], [-15, 14]];
  return sc.map((v, i) => {
    const [min, max] = ranges[i];
    return Math.round(Math.min(100, Math.max(0, (v - min) / (max - min) * 100)));
  });
}

function calcSc() {
  const sc = [0, 0, 0];
  Object.values(ST.ans).forEach(v => { sc[0] += v[0]; sc[1] += v[1]; sc[2] += v[2]; });
  return sc;
}
